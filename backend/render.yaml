services:
  - type: web
    name: opportune-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: opportune_prod
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
